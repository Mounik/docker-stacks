services:
  netbox:
    image: netboxcommunity/netbox:v4.2.8
    container_name: netbox
    restart: unless-stopped
    environment:
      - CORS_ORIGIN_ALLOW_ALL=true
      - DB_HOST=db
      - DB_NAME=netbox
      - DB_USER=${POSTGRES_USER:-netbox}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-ChangeMeNow!}
      - SECRET_KEY=${NETBOX_SECRET_KEY}
      - EMAIL_SERVER=localhost
      - EMAIL_PORT=25
      - EMAIL_USERNAME=
      - EMAIL_PASSWORD=
      - EMAIL_USE_SSL=false
      - EMAIL_USE_TLS=false
      - NAPALM_USERNAME=
      - NAPALM_PASSWORD=
      - NAPALM_TIMEOUT=10
      - NAPALM_ARGS={}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DATABASE=0
      - REDIS_CACHE_HOST=redis
      - REDIS_CACHE_PORT=6379
      - REDIS_CACHE_PASSWORD=${REDIS_PASSWORD}
      - REDIS_CACHE_DATABASE=1
      - WEBHOOKS_ENABLED=true
      - BASE_PATH=
    depends_on:
      - db
      - redis
    networks:
      - proxy
      - netbox_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netbox.rule=Host(`${NETBOX_DOMAIN}`)"
      - "traefik.http.routers.netbox.entrypoints=websecure"
      - "traefik.http.routers.netbox.tls.certresolver=letsencrypt"
      - "traefik.http.services.netbox.loadbalancer.server.port=8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    image: netboxcommunity/netbox:v4.2.8
    container_name: netbox_worker
    restart: unless-stopped
    command: /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py rqworker high default low
    environment:
      - DB_HOST=db
      - DB_NAME=netbox
      - DB_USER=${POSTGRES_USER:-netbox}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-ChangeMeNow!}
      - SECRET_KEY=${NETBOX_SECRET_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - netbox_internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:16-alpine
    container_name: netbox_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-netbox}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeMeNow!}
      - POSTGRES_DB=netbox
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - netbox_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netbox} -d netbox"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: netbox_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - netbox_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  housekeeper:
    image: netboxcommunity/netbox:v4.2.8
    container_name: netbox_housekeeping
    restart: unless-stopped
    command: /opt/netbox/housekeeping.sh
    environment:
      - DB_HOST=db
      - DB_NAME=netbox
      - DB_USER=${POSTGRES_USER:-netbox}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-ChangeMeNow!}
      - SECRET_KEY=${NETBOX_SECRET_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - db
      - redis
    networks:
      - netbox_internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
  netbox_internal:

volumes:
  db_data:
    name: docker-stacks_netbox_db_data
  redis_data:
    name: docker-stacks_netbox_redis_data
