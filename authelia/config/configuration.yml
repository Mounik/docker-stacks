---
server:
  address: "tcp://0.0.0.0:9091"
  buffers:
    read: 4096
    write: 4096

log:
  level: "info"

telemetry:
  metrics:
    enabled: true
    address: "tcp://0.0.0.0:9959"

totp:
  disable: false
  issuer: "authelia"

webauthn:
  disable: false
  display_name: "Authelia"

ntp:
  address: "time.cloudflare.com:123"

authentication_backend:
  file:
    path: "/config/users_database.yml"
    password:
      algorithm: "argon2id"
      iterations: 1
      key_length: 32
      salt_length: 16
      memory: 65536
      parallelism: 4

access_control:
  default_policy: "deny"
  rules:
    - domain: "*.${DOMAIN}"
      policy: "two_factor"

session:
  name: "authelia_session"
  secret: "${AUTHELIA_SESSION_SECRET}"
  expiration: "4h"
  inactivity: "30m"
  remember_me: "1M"
  cookies:
    - name: "authelia_session"
      domain: "${DOMAIN}"
      default_redirection_url: "https://${DOMAIN}"
  redis:
    host: redis
    port: 6379
    password: "${AUTHELIA_REDIS_PASSWORD}"

regulation:
  max_retries: 3
  find_time: "2m"
  ban_time: "5m"

storage:
  local:
    path: "/config/db.sqlite3"
  encryption_key: "${AUTHELIA_STORAGE_KEY}"

notifier:
  disable_startup_check: false
  smtp:
    host: "${SMTP_HOST}"
    port: 587
    username: "${SMTP_USER}"
    password: "${SMTP_PASSWORD}"
    sender: "${SMTP_FROM}"
    subject: "[Authelia] {title}"
    startup_check_address: "${SMTP_STARTUP_CHECK}"
    disable_require_tls: false
    disable_html_emails: false
    tls:
      server_name: "${SMTP_HOST}"
      minimum_version: "TLS1.2"