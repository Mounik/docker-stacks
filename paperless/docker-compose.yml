services:
  broker:
    image: redis:7-alpine
    container_name: paperless_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - paperless_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: paperless_db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeMeNow!}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - paperless_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless"]
      interval: 30s
      timeout: 5s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8.18
    container_name: paperless_gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - paperless_internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  tika:
    image: ghcr.io/paperless-ngx/tika:latest
    container_name: paperless_tika
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - paperless_internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9998"]
      interval: 30s
      timeout: 5s
      retries: 3

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:v2.20.14
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    environment:
      - PAPERLESS_REDIS=redis://broker:6379
      - PAPERLESS_DBHOST=db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${POSTGRES_PASSWORD:-ChangeMeNow!}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER:-admin}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD:-ChangeMeNow!}
      - PAPERLESS_URL=https://${PAPERLESS_DOMAIN}
      - PAPERLESS_ALLOWED_HOSTS=${PAPERLESS_DOMAIN}
      - PAPERLESS_CSRF_TRUSTED_ORIGINS=https://${PAPERLESS_DOMAIN}
      - PAPERLESS_TIKA_ENABLED=1
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=http://gotenberg:3000
      - PAPERLESS_TIKA_ENDPOINT=http://tika:9998
    volumes:
      - paper_data:/usr/src/paperless/data
      - paper_media:/usr/src/paperless/media
      - paper_export:/usr/src/paperless/export
      - paper_consume:/usr/src/paperless/consume
    networks:
      - proxy
      - paperless_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperless.rule=Host(`${PAPERLESS_DOMAIN}`)"
      - "traefik.http.routers.paperless.entrypoints=websecure"
      - "traefik.http.routers.paperless.tls.certresolver=letsencrypt"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  proxy:
    external: true
  paperless_internal:

volumes:
  paper_data:
    name: docker-stacks_paper_data
  paper_media:
    name: docker-stacks_paper_media
  paper_export:
    name: docker-stacks_paper_export
  paper_consume:
    name: docker-stacks_paper_consume
  pgdata:
    name: docker-stacks_paper_pgdata
  redis_data:
    name: docker-stacks_paper_redis_data
